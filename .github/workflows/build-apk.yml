name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build & Package APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Configure Build Environment
        run: |
          # Create a dummy .env file to prevent the Secrets Gradle Plugin from failing
          touch .env
          
          # Restore or generate debug keystore needed by app/build.gradle.kts
          if [ ! -f "debug.keystore" ] && [ -f "debug.keystore.base64" ]; then
            echo "Decoding debug.keystore from debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ ! -f "debug.keystore" ]; then
            echo "Generating fallback debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.3.1'
          validate-wrappers: false

      - name: Build Debug APK with Gradle
        run: gradle assembleDebug --no-daemon

      - name: Prepare Artifacts
        run: |
          mkdir -p build-artifacts
          if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
            cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/HotspotMonitor-Debug.apk
            echo "Built APK prepared successfully!"
          else
            echo "ERROR: Target apk not found at the expected location!"
            exit 1
          fi

      - name: Upload Compiled APK
        uses: actions/upload-artifact@v4
        with:
          name: HotspotMonitor-Debug-APK
          path: build-artifacts/HotspotMonitor-Debug.apk
          if-no-files-found: error
          retention-days: 7
